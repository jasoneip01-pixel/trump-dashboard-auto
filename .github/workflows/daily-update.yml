name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 15 * * *'          # 每天 PDT 上午 8:00 (UTC 15:00，北京时间晚上 11:00，可自行调整)
  workflow_dispatch:             # 允许手动触发测试

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write            # 必须有写权限才能 push 到 gh-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (如果 update.sh 需要 pip 包，加在这里)
        run: |
          python -m pip install --upgrade pip
          # 示例：pip install requests pandas beautifulsoup4 等，根据你的脚本需要添加
          # 如果 update.sh 完全不依赖 Python 包，这一步可以留空或注释掉

      - name: Make script executable
        run: chmod +x update.sh || true   # 如果文件不存在也不会失败

      - name: Run daily update
        run: bash update.sh || true       # 加 || true 防止脚本出错直接让 workflow 失败，可根据需要移除

      - name: Commit and push to gh-pages
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add .
          
          # 如果没有变化，也强制创建一个 commit（可选，根据需求）
          git commit -m "Daily dashboard update: $(date +'%Y-%m-%d %H:%M:%S %Z')" --allow-empty || echo "No changes to commit"
          
          # 使用 --force 覆盖 gh-pages 分支（最简单可靠的解决方式）
          git push origin HEAD:gh-pages --force
