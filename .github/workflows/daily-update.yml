name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 15 * * *'          # 每天 PDT 上午8:00（UTC 15:00，北京时间晚上11:00，可改）
  workflow_dispatch:             # 允许手动触发测试

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write            # 允许 push 到 gh-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (如果你的 update.py 需要包，加在这里)
        run: |
          python -m pip install --upgrade pip
          # 示例：pip install requests pandas 等，根据需要加

      - name: Run daily update
      run: bash update.sh      # 改成 bash update.sh（或 ./update.sh，如果有 shebang）

      - name: Commit and push to gh-pages
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add .
          git commit -m "Daily update: $(date +'%Y-%m-%d')" || echo "No changes"
          
          git push origin HEAD:gh-pages
