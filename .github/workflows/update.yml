name: Autonomous Trading Dashboard

on:
  schedule:
    - cron: '0 * * * *' # 每小时自动运行一次 (无人驾驶关键)
  workflow_dispatch:      # 依然保留手动触发按钮

jobs:
  auto-pilot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Quant Tools
        run: pip install yfinance pandas numpy requests

      - name: Execute Model Engine
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: python build_dashboard.py

      - name: Auto-Commit Results
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Autonomous-Bot"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-pilot: Update market intelligence" && git push)
