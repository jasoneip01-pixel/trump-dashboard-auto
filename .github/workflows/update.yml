name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 添加权限确保 Action 能够把生成的 HTML 推送到仓库
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升级到最新版本

      - name: Set up Python
        uses: actions/setup-python@v5 # 修正了这里：由 os-actions 改为 actions
        with:
          python-version: '3.9'
          cache: 'pip' # 开启缓存加快后续运行速度

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests

      - name: Run script
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: python build_dashboard.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-update terminal data" || exit 0
          git push
