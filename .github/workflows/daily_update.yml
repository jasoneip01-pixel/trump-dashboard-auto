name: Daily Dashboard Update

on:
  schedule:
    # 北京时间 06:30 (UTC 22:30)
    - cron: '30 22 * * *'
  workflow_dispatch: 

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests --quiet

      - name: Run Fetch and Build
        run: python fetch_and_build_dashboard.py

      - name: Deploy Update
        run: |
          mkdir -p docs
          cp trump_dashboard.html docs/index.html
          git config --local user.name "github-actions[bot]"
          git config --local user.email "actions@github.com"
          git add docs/index.html
          # 仅在网页有实际内容变动时才推送
          git diff --staged --quiet || (git commit -m "Auto-update: $(date)" && git push origin main)
