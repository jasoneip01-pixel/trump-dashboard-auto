name: Daily Dashboard Update

on:
  schedule:
    # 对应北京时间 06:30 (UTC 22:30)
    - cron: '30 22 * * *'
  workflow_dispatch: # 允许手动点击 Run workflow 测试

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开启，否则无法 push 网页更新

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests --quiet

      - name: Run Fetch and Build Script
        run: python fetch_and_build_dashboard.py

      - name: Deploy to GitHub Pages Folder
        run: |
          # 确保 docs 目录存在
          mkdir -p docs
          # 将生成的看板移动到 docs 目录作为 index.html
          cp trump_dashboard.html docs/index.html
          
          # 配置 Git 机器人信息
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查是否有内容变化，有则提交并推送
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Auto-update dashboard: $(date +'%Y-%m-%d %H:%M:%S %Z')"
            git push origin main
          fi
