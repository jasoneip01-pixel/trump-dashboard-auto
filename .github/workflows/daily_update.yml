name: Daily Dashboard Update

on:
  schedule:
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance pandas numpy scipy --quiet

      - name: Run fetch and build
        run: python fetch_and_build_dashboard.py

      - name: Copy to docs folder
        run: |
          mkdir -p docs
          cp trump_dashboard.html docs/index.html

      - name: Commit and push docs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "update dashboard $(date -u)"
          git push
