name: Daily Dashboard Update

on:
  schedule:
    # 北京时间每天早上 6:30 自动运行 (UTC 22:30)
    # 夏令时期间 (3月-11月)，此时为 PDT 15:30 (收盘后)
    - cron: '30 22 * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests yfinance pandas --quiet

      - name: Run fetch and build
        run: python fetch_and_build_dashboard.py

      - name: Copy to docs folder
        run: |
          mkdir -p docs
          cp trump_dashboard.html docs/index.html

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add docs/index.html
          # 仅在网页有实际内容变动时才推送，避免无意义的提交记录
          git diff --staged --quiet || (git commit -m "Auto-update dashboard: $(date)" && git push)
